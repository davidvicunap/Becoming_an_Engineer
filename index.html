<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Zero to Builder — a first-principles path from complete beginner to shipping real software and AI agents." />
  <title>Zero to Builder</title>
  <!-- Inline SVG favicon: no extra file, no 404, works offline. -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E" />
  <style>
/* ==========================================================================
   Zero to Builder — styles
   Mobile-first. Theme is controlled by [data-theme="dark|light"] on <html>.
   ========================================================================== */

/* ---------- Design tokens ---------- */
:root {
  --font-body: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
  --max-width: 960px;
  --header-h: 3.75rem;
}

:root[data-theme="dark"] {
  --bg: #0d1117;
  --bg-raised: #161b22;
  --bg-inset: #010409;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #9aa4b2;
  --accent: #58a6ff;
  --accent-contrast: #0d1117;
  --green: #3fb950;
  --red: #f85149;
  --amber: #d29922;
  --purple: #bc8cff;
  --xp: linear-gradient(90deg, #58a6ff, #bc8cff);
}

:root[data-theme="light"] {
  --bg: #f6f8fa;
  --bg-raised: #ffffff;
  --bg-inset: #eaeef2;
  --border: #d0d7de;
  --text: #1f2328;
  --text-dim: #57606a;
  --accent: #0969da;
  --accent-contrast: #ffffff;
  --green: #1a7f37;
  --red: #cf222e;
  --amber: #9a6700;
  --purple: #8250df;
  --xp: linear-gradient(90deg, #0969da, #8250df);
  --shadow: 0 2px 12px rgba(140, 149, 159, 0.2);
}

/* ---------- Reset-ish base ---------- */
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
img { max-width: 100%; }
code, pre, textarea.code-input {
  font-family: var(--font-mono);
  font-size: 0.875rem;
}
code {
  background: var(--bg-inset);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.1em 0.35em;
}
pre {
  background: var(--bg-inset);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.9rem 1rem;
  overflow-x: auto;
}
pre code { background: none; border: none; padding: 0; }
a { color: var(--accent); }
h1, h2, h3, h4 { line-height: 1.25; }

.skip-link {
  position: absolute;
  left: -999px;
  top: 0;
  background: var(--accent);
  color: var(--accent-contrast);
  padding: 0.5rem 1rem;
  z-index: 100;
}
.skip-link:focus { left: 0.5rem; top: 0.5rem; }

button { font-family: inherit; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
/* Router moves focus to <main> on navigation (good for keyboards and screen
   readers) — but the page-sized focus ring adds nothing. */
main:focus, main:focus-visible { outline: none; }

/* ---------- Header / HUD ---------- */
.site-header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border);
}
/* On phones the HUD gets its own row; one row on wider screens (media query
   below) — this is what keeps the header inside a 375px viewport. */
.header-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0.5rem 1rem;
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-areas:
    "brand nav"
    "hud   hud";
  gap: 0.4rem 0.75rem;
  align-items: center;
}
.brand { grid-area: brand; min-width: 0; }
.brand-name { overflow: hidden; text-overflow: ellipsis; }
.hud { grid-area: hud; }
.site-nav { grid-area: nav; justify-content: flex-end; min-width: 0; }
/* Compact type on phones so brand + nav share one 375px row comfortably. */
.brand-name { font-size: 0.95rem; }
.site-nav { gap: 0.5rem; }
.site-nav a { font-size: 0.85rem; }
.brand {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  text-decoration: none;
  color: var(--text);
  font-weight: 700;
}
.brand-mark { color: var(--accent); font-family: var(--font-mono); }
.brand-name { white-space: nowrap; }

.hud { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }
.hud-level { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; }
.hud-level-badge {
  background: var(--accent);
  color: var(--accent-contrast);
  font-weight: 700;
  border-radius: 999px;
  min-width: 1.4rem;
  height: 1.4rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 0.3rem;
}
.hud-level-title {
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hud-xp { display: flex; align-items: center; gap: 0.5rem; }
.xp-bar {
  flex: 1;
  height: 0.45rem;
  background: var(--bg-inset);
  border: 1px solid var(--border);
  border-radius: 999px;
  overflow: hidden;
  min-width: 3rem;
}
.xp-bar-fill {
  height: 100%;
  width: 0%;
  background: var(--xp);
  border-radius: 999px;
  transition: width 0.4s ease;
}
.hud-xp-text { font-size: 0.7rem; color: var(--text-dim); white-space: nowrap; }

.site-nav { display: flex; align-items: center; gap: 0.75rem; }
.site-nav a {
  text-decoration: none;
  color: var(--text-dim);
  font-size: 0.9rem;
  font-weight: 600;
  padding: 0.25rem 0.1rem;
  border-bottom: 2px solid transparent;
}
.site-nav a:hover { color: var(--text); }
.site-nav a.active { color: var(--text); border-bottom-color: var(--accent); }

.icon-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  width: 2.1rem;
  height: 2.1rem;
  cursor: pointer;
  color: var(--text);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.icon-btn:hover { background: var(--bg-inset); }
/* Sun/moon rendered with plain text so no icon font is needed. */
:root[data-theme="dark"] .theme-icon::before { content: "☀"; }
:root[data-theme="light"] .theme-icon::before { content: "☾"; }

/* ---------- Layout ---------- */
main {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 1.25rem 1rem 4rem;
}
.site-footer {
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.8rem;
  text-align: center;
  padding: 1.5rem 1rem 2.5rem;
}

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text);
  border-radius: var(--radius-sm);
  padding: 0.5rem 1rem;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
}
.btn:hover { background: var(--bg-inset); }
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-contrast);
}
.btn-primary:hover { filter: brightness(1.1); background: var(--accent); }
.btn-success { background: var(--green); border-color: var(--green); color: #fff; }
.btn-success:hover { filter: brightness(1.1); background: var(--green); }
.btn[disabled] { opacity: 0.5; cursor: not-allowed; }
.btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }

/* ---------- Hero (home) ---------- */
.hero { text-align: center; padding: 1.5rem 0 0.5rem; }
.hero h1 { font-size: 1.9rem; margin: 0 0 0.5rem; }
.hero h1 .grad {
  background: var(--xp);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.hero p { color: var(--text-dim); max-width: 38rem; margin: 0 auto 1rem; }

.free-roam {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.8rem;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
}
.free-roam input { accent-color: var(--accent); width: 1rem; height: 1rem; }

/* ---------- Roadmap ---------- */
.roadmap { list-style: none; margin: 2rem 0 0; padding: 0; position: relative; }
/* The connecting line down the left side that makes it read as a path. */
.roadmap::before {
  content: "";
  position: absolute;
  left: 1.35rem;
  top: 1rem;
  bottom: 1rem;
  width: 3px;
  background: var(--border);
  border-radius: 3px;
}
.roadmap-item { position: relative; padding: 0 0 1.1rem 3.4rem; }
.roadmap-node {
  position: absolute;
  left: 0;
  top: 0.35rem;
  width: 2.75rem;
  height: 2.75rem;
  border-radius: 50%;
  border: 3px solid var(--border);
  background: var(--bg-raised);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 1rem;
  z-index: 1;
}
.roadmap-item.done .roadmap-node { border-color: var(--green); color: var(--green); }
.roadmap-item.unlocked .roadmap-node { border-color: var(--accent); color: var(--accent); }
.roadmap-item.locked .roadmap-node { color: var(--text-dim); }

.module-card {
  display: block;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.9rem 1.1rem;
  text-decoration: none;
  color: var(--text);
  transition: border-color 0.15s ease, transform 0.15s ease;
}
a.module-card:hover { border-color: var(--accent); transform: translateX(3px); }
.module-card h3 { margin: 0 0 0.2rem; font-size: 1.05rem; }
.module-card p { margin: 0 0 0.5rem; color: var(--text-dim); font-size: 0.875rem; }
.module-card.locked { opacity: 0.65; }
.module-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem 0.9rem;
  align-items: center;
  font-size: 0.75rem;
  color: var(--text-dim);
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  font-size: 0.7rem;
  font-weight: 700;
  border-radius: 999px;
  padding: 0.1rem 0.6rem;
  border: 1px solid var(--border);
  color: var(--text-dim);
}
.badge-done { border-color: var(--green); color: var(--green); }
.badge-unlocked { border-color: var(--accent); color: var(--accent); }
.badge-stub { border-color: var(--amber); color: var(--amber); }
.badge-flagship { border-color: var(--purple); color: var(--purple); }

.mini-progress {
  height: 0.3rem;
  background: var(--bg-inset);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 0.6rem;
}
.mini-progress-fill { height: 100%; background: var(--xp); border-radius: 999px; }

/* ---------- Module page ---------- */
.crumbs { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.75rem; }
.crumbs a { color: var(--text-dim); }
.page-head h1 { margin: 0 0 0.25rem; font-size: 1.6rem; }
.page-head .tagline { color: var(--text-dim); margin: 0 0 1.25rem; }

.item-list { list-style: none; padding: 0; margin: 1rem 0; display: grid; gap: 0.6rem; }
.item-row {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.75rem 1rem;
  text-decoration: none;
  color: var(--text);
}
a.item-row:hover { border-color: var(--accent); }
.item-icon { font-size: 1.1rem; width: 1.6rem; text-align: center; flex-shrink: 0; }
.item-row .grow { flex: 1; min-width: 0; }
.item-row h4 { margin: 0; font-size: 0.95rem; }
.item-row .sub { font-size: 0.75rem; color: var(--text-dim); }
.check { color: var(--green); font-weight: 700; flex-shrink: 0; }

/* ---------- Lesson content ---------- */
.lesson-body { max-width: 44rem; }
.lesson-body h2 { font-size: 1.2rem; margin-top: 2rem; }
.lesson-body p, .lesson-body li { font-size: 0.95rem; }
.lesson-body blockquote {
  margin: 1rem 0;
  padding: 0.6rem 1rem;
  border-left: 3px solid var(--accent);
  background: var(--bg-raised);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  color: var(--text-dim);
}
.callout {
  border: 1px solid var(--border);
  border-left: 4px solid var(--purple);
  background: var(--bg-raised);
  border-radius: var(--radius-sm);
  padding: 0.75rem 1rem;
  margin: 1.25rem 0;
  font-size: 0.9rem;
}
.callout strong:first-child { color: var(--purple); }
.callout-tradeoff { border-left-color: var(--amber); }
.callout-tradeoff strong:first-child { color: var(--amber); }

.lesson-nav {
  display: flex;
  justify-content: space-between;
  gap: 1rem;
  margin-top: 2.5rem;
  flex-wrap: wrap;
}

/* ---------- Challenge / editor ---------- */
.challenge {
  margin-top: 2.5rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-raised);
  overflow: hidden;
}
.challenge-head {
  padding: 0.8rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0.6rem;
  flex-wrap: wrap;
}
.challenge-head h3 { margin: 0; font-size: 1rem; flex: 1; }
.lang-chip {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 700;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  background: var(--bg-inset);
  border: 1px solid var(--border);
  color: var(--amber);
}
.challenge-prompt { padding: 0.9rem 1rem 0; font-size: 0.9rem; }
.challenge-prompt p:first-child { margin-top: 0; }

.editor-wrap { padding: 0.9rem 1rem; }
textarea.code-input {
  width: 100%;
  min-height: 14rem;
  resize: vertical;
  background: var(--bg-inset);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.8rem;
  line-height: 1.5;
  tab-size: 2;
  white-space: pre;
  overflow-wrap: normal;
  overflow-x: auto;
}
textarea.code-input:focus-visible { outline: 2px solid var(--accent); border-color: var(--accent); }

.challenge-actions {
  display: flex;
  gap: 0.5rem;
  padding: 0 1rem 0.9rem;
  flex-wrap: wrap;
  align-items: center;
}
.challenge-status { font-size: 0.8rem; color: var(--text-dim); margin-left: auto; }

.console {
  margin: 0 1rem 1rem;
  background: var(--bg-inset);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.7rem 0.9rem;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 16rem;
  overflow-y: auto;
}
.console:empty { display: none; }
.console .ok { color: var(--green); }
.console .err { color: var(--red); }
.console .hint { color: var(--amber); }
.console .dim { color: var(--text-dim); }

/* ---------- Project brief / checklist ---------- */
.project-brief { max-width: 44rem; }
.checklist { list-style: none; padding: 0; margin: 1rem 0; display: grid; gap: 0.5rem; }
.checklist li {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.checklist label {
  display: flex;
  gap: 0.7rem;
  align-items: flex-start;
  padding: 0.7rem 0.9rem;
  cursor: pointer;
  font-size: 0.9rem;
}
.checklist input {
  accent-color: var(--green);
  width: 1.1rem;
  height: 1.1rem;
  margin-top: 0.15rem;
  flex-shrink: 0;
}
.checklist li.ticked { border-color: var(--green); }
.checklist li.ticked label { color: var(--text-dim); text-decoration: line-through; }

/* ---------- Achievements ---------- */
.shelf {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 0.8rem;
  margin-top: 1.5rem;
  padding: 0;
  list-style: none;
}
.trophy {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  display: flex;
  gap: 0.8rem;
  align-items: flex-start;
}
.trophy .emoji { font-size: 1.7rem; line-height: 1; }
.trophy h4 { margin: 0 0 0.15rem; font-size: 0.95rem; }
.trophy p { margin: 0; font-size: 0.78rem; color: var(--text-dim); }
.trophy.locked { opacity: 0.45; filter: grayscale(1); }
.trophy.earned { border-color: var(--purple); }
.trophy .earned-date { display: block; margin-top: 0.3rem; font-size: 0.7rem; color: var(--purple); }

/* ---------- Toasts ---------- */
.toasts {
  position: fixed;
  bottom: 1rem;
  right: 1rem;
  left: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  z-index: 50;
  pointer-events: none;
}
.toast {
  background: var(--bg-raised);
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 0.7rem 1rem;
  box-shadow: var(--shadow);
  font-size: 0.85rem;
  animation: toast-in 0.25s ease, toast-out 0.4s ease 3.6s forwards;
  margin-left: auto;
  max-width: 22rem;
}
.toast-achievement { border-color: var(--purple); }
@keyframes toast-in { from { transform: translateY(10px); opacity: 0; } }
@keyframes toast-out { to { transform: translateY(10px); opacity: 0; } }

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  html { scroll-behavior: auto; }
}

/* ---------- Wider screens ---------- */
@media (min-width: 700px) {
  .hero h1 { font-size: 2.4rem; }
  .header-inner {
    padding: 0.6rem 1.5rem;
    grid-template-columns: auto minmax(0, 1fr) auto;
    grid-template-areas: "brand hud nav";
  }
  .brand-name { font-size: 1rem; }
  .site-nav { gap: 0.75rem; }
  .site-nav a { font-size: 0.9rem; }
  main { padding: 2rem 1.5rem 5rem; }
  .toasts { left: auto; }
  .roadmap::before { left: 1.6rem; }
  .roadmap-item { padding-left: 4rem; }
  .roadmap-node { width: 3.25rem; height: 3.25rem; }
}

  <!--
    This <script> runs before anything renders so the saved theme is applied
    immediately and the page never "flashes" the wrong colors.
  -->
  <script>
    (function () {
      try {
        var raw = localStorage.getItem("ztb.state.v1");
        var theme = raw ? (JSON.parse(raw).settings || {}).theme : null;
        if (!theme) {
          theme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>

<body>
  <a class="skip-link" href="#app">Skip to content</a>

  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="#/" aria-label="Zero to Builder home">
        <span class="brand-mark" aria-hidden="true">⟨/⟩</span>
        <span class="brand-name">Zero&nbsp;to&nbsp;Builder</span>
      </a>

      <!-- Live progress readout: level, XP, and a bar toward the next level. -->
      <div class="hud" role="status" aria-live="polite">
        <div class="hud-level">
          <span class="hud-level-badge" id="hud-level">1</span>
          <span class="hud-level-title" id="hud-title">Curious Human</span>
        </div>
        <div class="hud-xp">
          <div class="xp-bar" aria-hidden="true"><div class="xp-bar-fill" id="hud-xp-fill"></div></div>
          <span class="hud-xp-text" id="hud-xp-text">0 XP</span>
        </div>
      </div>

      <nav class="site-nav" aria-label="Primary">
        <a href="#/" data-nav="home">Path</a>
        <a href="#/achievements" data-nav="achievements">Achievements</a>
        <button id="theme-toggle" class="icon-btn" type="button"
                aria-label="Toggle dark or light mode" title="Toggle theme">
          <span class="theme-icon" aria-hidden="true"></span>
        </button>
      </nav>
    </div>
  </header>

  <!-- Every view (roadmap, module, lesson, project…) renders into this element. -->
  <main id="app" tabindex="-1"></main>

  <footer class="site-footer">
    <p>Built by you, for you. Everything runs in your browser — your progress lives in
       <code>localStorage</code> and never leaves this device.</p>
  </footer>

  <!-- Toast container for XP gains and achievement unlocks. -->
  <div id="toasts" class="toasts" aria-live="polite"></div>

  <script type="module">

/* ================= js/state.js ================= */
const state = (function () {
/**
 * state.js — the single source of truth for learner progress.
 *
 * Everything lives in one JSON blob under one localStorage key, so:
 *   - a page refresh loses nothing,
 *   - backing up your progress is "copy one string",
 *   - there are no accounts and no network calls.
 *
 * Shape of the persisted state:
 * {
 *   xp: 0,                                 // total XP ever earned
 *   completedLessons:  { "m1-l1": true },  // lessonKey -> true
 *   passedChallenges:  { "m1-l1": true },  // challenges are keyed by their lesson
 *   projectChecks:     { "m1": { "c1": true } }, // per-project checklist ticks
 *   completedProjects: { "m1": true },
 *   achievements:      { "rubber-duck": 1712345678901 }, // id -> unlock timestamp
 *   savedCode:         { "m1-l1": "..." }, // learner's editor drafts
 *   settings:          { theme: "dark", freeRoam: false }
 * }
 */

const KEY = "ztb.state.v1";

/** XP rewards, kept in one place so rebalancing is a one-line change. */
const XP = { lesson: 25, challenge: 50, project: 100 };

/** Each level costs 150 XP. Titles give levels some personality. */
const XP_PER_LEVEL = 150;
const LEVEL_TITLES = [
  "Curious Human",     // level 1
  "Pattern Spotter",
  "Problem Splitter",
  "Debugger",
  "Builder",
  "Full-Stack Thinker",
  "Shipper",
  "Agent Architect",
  "Systems Engineer",
  "Zero to Builder",   // level 10+
];

function defaults() {
  return {
    xp: 0,
    completedLessons: {},
    passedChallenges: {},
    projectChecks: {},
    completedProjects: {},
    achievements: {},
    savedCode: {},
    settings: { theme: null, freeRoam: false },
  };
}

/** Load once at startup; all reads/writes go through this in-memory object. */
let state = load();

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (!raw) return defaults();
    // Merge over defaults so adding new fields later never breaks old saves.
    return { ...defaults(), ...JSON.parse(raw) };
  } catch {
    return defaults();
  }
}

function save() {
  try {
    localStorage.setItem(KEY, JSON.stringify(state));
  } catch {
    // Storage full or blocked (e.g. private mode) — the app still works,
    // progress just won't survive the session. Nothing to crash over.
  }
}

/* ------------------------------------------------------------------ */
/* Simple pub/sub so the header HUD re-renders whenever progress moves. */
/* ------------------------------------------------------------------ */
const listeners = new Set();
function subscribe(fn) { listeners.add(fn); }
function notify() { listeners.forEach((fn) => fn(state)); }

/* ---------------- XP & levels ---------------- */

function getXP() { return state.xp; }

function getLevel() {
  const level = Math.floor(state.xp / XP_PER_LEVEL) + 1;
  const title = LEVEL_TITLES[Math.min(level, LEVEL_TITLES.length) - 1];
  const intoLevel = state.xp % XP_PER_LEVEL;
  return { level, title, intoLevel, needed: XP_PER_LEVEL, pct: (intoLevel / XP_PER_LEVEL) * 100 };
}

function addXP(amount, reason) {
  state.xp += amount;
  save();
  notify();
  toast(`+${amount} XP — ${reason}`);
}

/* ---------------- Lessons ---------------- */

function isLessonDone(lessonKey) { return !!state.completedLessons[lessonKey]; }

function completeLesson(lessonKey, lessonTitle) {
  if (state.completedLessons[lessonKey]) return false; // XP only once
  state.completedLessons[lessonKey] = true;
  save();
  addXP(XP.lesson, `finished “${lessonTitle}”`);
  return true;
}

/* ---------------- Challenges ---------------- */

function isChallengePassed(lessonKey) { return !!state.passedChallenges[lessonKey]; }

function passChallenge(lessonKey, challengeTitle) {
  if (state.passedChallenges[lessonKey]) return false;
  state.passedChallenges[lessonKey] = true;
  save();
  addXP(XP.challenge, `passed “${challengeTitle}”`);
  return true;
}

/** Draft code persistence so a refresh never eats your work. */
function getSavedCode(lessonKey) { return state.savedCode[lessonKey] ?? null; }
function saveCode(lessonKey, code) {
  state.savedCode[lessonKey] = code;
  save();
}

/* ---------------- Projects ---------------- */

function getProjectChecks(projectId) { return state.projectChecks[projectId] || {}; }

function setProjectCheck(projectId, itemId, checked) {
  if (!state.projectChecks[projectId]) state.projectChecks[projectId] = {};
  state.projectChecks[projectId][itemId] = checked;
  save();
  notify();
}

function isProjectDone(projectId) { return !!state.completedProjects[projectId]; }

function completeProject(projectId, projectTitle) {
  if (state.completedProjects[projectId]) return false;
  state.completedProjects[projectId] = true;
  save();
  addXP(XP.project, `shipped project “${projectTitle}”`);
  return true;
}

/**
 * Read-only snapshot of progress maps, used by achievement checks.
 * Copies, so nothing outside this module can mutate state by accident.
 */
function snapshot() {
  return {
    completedLessons: { ...state.completedLessons },
    passedChallenges: { ...state.passedChallenges },
    completedProjects: { ...state.completedProjects },
  };
}

/* ---------------- Achievements ---------------- */

function hasAchievement(id) { return !!state.achievements[id]; }
function getAchievements() { return { ...state.achievements }; }

function unlockAchievement(def) {
  if (!def || state.achievements[def.id]) return false;
  state.achievements[def.id] = Date.now();
  save();
  notify();
  toast(`${def.emoji} Achievement unlocked: ${def.name}`, "toast-achievement");
  return true;
}

/* ---------------- Settings ---------------- */

function getTheme() {
  return (
    state.settings.theme ||
    (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark")
  );
}

function toggleTheme() {
  const next = getTheme() === "dark" ? "light" : "dark";
  state.settings.theme = next;
  save();
  document.documentElement.setAttribute("data-theme", next);
  return next;
}

function isFreeRoam() { return !!state.settings.freeRoam; }
function setFreeRoam(on) {
  state.settings.freeRoam = on;
  save();
  notify();
}

/* ---------------- Toasts ---------------- */

/** Tiny notification helper — lives here because state changes trigger it. */
function toast(message, extraClass = "") {
  const holder = document.getElementById("toasts");
  if (!holder) return;
  const el = document.createElement("div");
  el.className = `toast ${extraClass}`;
  el.textContent = message;
  holder.appendChild(el);
  setTimeout(() => el.remove(), 4200); // matches the CSS toast-out timing
}

  return { XP, subscribe, getXP, getLevel, addXP, isLessonDone, completeLesson, isChallengePassed, passChallenge, getSavedCode, saveCode, getProjectChecks, setProjectCheck, isProjectDone, completeProject, snapshot, hasAchievement, getAchievements, unlockAchievement, getTheme, toggleTheme, isFreeRoam, setFreeRoam, toast };
})();

<h2>Why switches are enough</h2>
<p>One switch stores almost nothing: ON or OFF, which we write as <code>1</code> or
<code>0</code> — a <em>bit</em>. But combine bits and you can represent anything
countable:</p>

<h2>Memory is a giant numbered shelf</h2>

<h2>Instructions are dumber than you think</h2>
<p>Real CPU instructions are tiny: <em>add these two numbers</em>, <em>copy this

<ol>
  <li><strong>DNS:</strong> your computer asks a directory service, "what's the

      like <code>93.184.216.34</code>. DNS is a phone book, nothing more.</li>
  <li><strong>TCP:</strong> your computer opens a reliable two-way conversation
      with that address. Packets can arrive late, broken, or not at all — TCP
      numbers them, confirms receipt, and re-sends losses so both sides can
      pretend the connection is a clean pipe.</li>
  <li><strong>HTTP:</strong> over that pipe, your browser sends a
      <em>plain text letter</em> asking for the page.</li>

<h2>An HTTP request, unmasked</h2>
<p>This is the actual text your browser sends. No magic, just a strict format:</p>

Accept: application/json

<p>Every problem that feels impossible is really a <em>pile</em> of problems that
are each easy. The core engineering move — the one you'll use daily for the rest
of your career — is <strong>decomposition</strong>: splitting a big fuzzy problem
into small, sharply-defined pieces.</p>

<h2>What a good piece looks like</h2>
<p>A well-cut piece has three properties:</p>
<ul>
  <li><strong>One job.</strong> You can describe it in one sentence without "and".</li>
  <li><strong>Clear inputs and outputs.</strong> You know exactly what goes in and
      what must come out — which means you can test it alone.</li>
  <li><strong>Ignorable insides.</strong> Once it works, you can forget how and just
      use it. (Sound familiar? This is the abstraction idea from Module 1, applied
      to your own code.)</li>
</ul>

<h2>Example: "build a checkout"</h2>
<p>"Build a checkout" is paralyzing. But watch it dissolve:</p>
<pre><code>total(cart, discountCode, taxRate)
├── subtotal(items)            → sum of price × quantity
├── applyDiscount(amount, code) → amount after discount rules
└── addTax(amount, rate)        → amount with tax, rounded to cents</code></pre>
<p>Each leaf is a function a beginner can write in five minutes. The "hard" problem
was never hard — it was just <em>uncut</em>.</p>

<h2>How to practice it</h2>
<ol>
  <li>Write the big goal as one sentence.</li>
  <li>List the 3–6 sub-steps as verbs ("compute…", "check…", "format…").</li>
  <li>If any step still scares you, cut <em>that one</em> again.</li>
  <li>Solve the leaves. Compose them. Done.</li>
</ol>

<div class="callout"><strong>Engineer's habit:</strong> when you're stuck, you're
almost never missing intelligence — you're missing a smaller problem. Don't think
harder, cut smaller.</div>

<p>Beginners debug by <em>staring</em> and <em>hoping</em>. Engineers debug the way
scientists work: with a loop of hypothesis and experiment. The difference in speed
is 10×, and it's a learnable procedure, not a talent.</p>

<h2>The loop</h2>
<ol>
  <li><strong>Observe.</strong> What exactly happens, versus what you expected?
      Write both down. "It's broken" is not an observation;
      "median([10, 2, 33]) returns 2, expected 10" is.</li>
  <li><strong>Hypothesize.</strong> One specific, falsifiable guess:
      "the sort is putting 10 before 2 because it's comparing strings."</li>
  <li><strong>Experiment.</strong> The cheapest test that could prove the guess
      wrong — usually a <code>console.log</code> of an intermediate value.</li>
  <li><strong>Conclude and repeat.</strong> Confirmed → fix it. Refuted → your model
      of the code was wrong somewhere; that's <em>information</em>, not failure.</li>
</ol>

<h2>Rules that keep you honest</h2>
<ul>
  <li><strong>One change at a time.</strong> Change two things and you learn nothing
      from the result.</li>
  <li><strong>Read the error message. All of it. Twice.</strong> Error messages name

  <li><strong>Explain the code out loud</strong> line by line — to a colleague, or
      famously, to a rubber duck. The bug is usually in the line where your
      explanation says "and this obviously…" — <em>obviously</em> is where
      assumptions hide.</li>
  <li><strong>The bug is in your code.</strong> Not the language, not the browser.

<p>The highest-leverage skill nobody teaches: <strong>reading documentation
precisely</strong>. Docs are contracts. Every word is load-bearing — "returns a
<em>new</em> array" vs "modifies the array" is the difference between working code
and a haunted bug hunt.</p>

<h2>How engineers read docs</h2>
<ul>
  <li><strong>Signature first.</strong> What goes in (types, order, which arguments
      are optional), what comes out.</li>
  <li><strong>Edge cases second.</strong> What happens with empty input? Negative
      numbers? The docs usually say — in one easily-skimmed-past sentence.</li>
  <li><strong>Examples last.</strong> Examples show the happy path; the prose holds
      the truth. Never code from examples alone.</li>
</ul>
<p>This transfers directly to the AI era: an API reference, a library README, and a
model card are all read the same way. So is a spec you hand to an AI assistant —
writing precise docs and reading them are the same muscle.</p>

<h2>Asking good questions</h2>
<p>When docs and debugging both fail, engineers ask — but a good question is
engineered too:</p>
<ol>
  <li><strong>What you're trying to do</strong> (the goal, not your attempted solution —

  <li><strong>The smallest snippet that reproduces the problem.</strong> Making

  <li><strong>What you observed vs. expected</strong>, exact error text included.</li>

question gets a vague answer from humans and models alike.</p>

failing. You'll arrive with a better question — or no question at all.</div>

<p>You've been using functions since Module 1; now let's name what they really
are, and meet the two data structures that carry 95% of all real-world data.</p>

<h2>Functions are contracts</h2>
<p>A function is a <em>named, reusable piece of your decomposition</em>: inputs in,
output out, insides ignorable. When you wrote <code>subtotal()</code> in Module 2
and then forgot how it worked — that was the point. Good functions let you
<strong>think in bigger units</strong>.</p>

<h2>Arrays / lists: ordered many</h2>
<pre><code>// JavaScript                          # Python
const scores = [90, 85, 77];           scores = [90, 85, 77]
scores[0]        // 90                 scores[0]       # 90
scores.length    // 3                  len(scores)     # 3
scores.push(100)                       scores.append(100)</code></pre>

<h2>Objects / dicts: labeled facts</h2>
<pre><code>// JavaScript                          # Python
const user = {                         user = {
  name: "Ada",                             "name": "Ada",
  plan: "free",                            "plan": "free",
};                                     }
user.plan        // "free"             user["plan"]    # "free"</code></pre>
<p>Almost every payload on the internet — every API response, every AI model reply
— is these two shapes nested: <em>lists of objects of lists of objects</em>. JSON,
which you'll live in from Module 5 onward, is exactly this, written down.</p>

      minutes: 18,
      content: `
<p>Before building agents, you need an honest mental model of the engine. An
<strong>LLM</strong> (large language model) is a next-token predictor: given a
sequence of tokens, it outputs a probability for every possible next token, one
is chosen, appended, and the process repeats. Everything impressive an LLM does
emerges from that loop — and so does every limitation.</p>

<h2>Tokens: the model's alphabet</h2>
<p>Models don't see letters or words; they see <strong>tokens</strong> — chunks of
roughly 3–4 English characters. "understanding" might be
<code>under|stand|ing</code>. This matters practically because
<em>everything is billed and bounded in tokens</em>: API pricing is per token,
speed is tokens/second, and the context window is a token budget. A useful rule
of thumb you'll implement in a minute: <strong>tokens ≈ characters / 4</strong>.</p>

<h2>Context: the model's entire world</h2>
<p>The <strong>context window</strong> is everything the model can see for one
call: the system prompt, the conversation so far, any documents you pasted in.
Outside the window, nothing exists. Two consequences define agent engineering:</p>
<ul>
  <li><strong>LLMs have no memory.</strong> A "conversation" is an illusion your
      code maintains by re-sending the history every single call. When the history
      outgrows the window, <em>your code</em> chooses what to drop — that choice is
      an engineering decision, and it's this lesson's challenge.</li>
  <li><strong>Quality degrades as the window fills.</strong> Bigger context ≠ better
      answers; relevant context = better answers. (This insight becomes RAG in a
      later lesson.)</li>
</ul>

<h2>The knobs you control</h2>
<ul>
  <li><strong>System prompt:</strong> standing instructions with special authority —
      who the model is, the rules, the output format. In agents it carries the tool
      manual too.</li>
  <li><strong>Temperature:</strong> how the next token gets picked. Near 0: always
      the most likely token — predictable, best for extraction and tool calls.
      Higher (~1): more randomness — better for brainstorming, worse for
      correctness. Agents mostly run cool.</li>
  <li><strong>Structured output:</strong> asking for JSON matching a schema instead
      of prose. This is the bridge from "chatbot" to "component you can build on" —
      code can't parse vibes, it can parse JSON.</li>
</ul>

<div class="callout callout-tradeoff"><strong>Power / privacy / cost:</strong>
context is the recurring bill. Every token you keep in the window costs money
(cloud: per-token pricing on <em>every</em> call, since history is re-sent) or
time (local: attention over a long context slows generation). Trimming context
well is the cheapest optimization in all of agent engineering — which is why it's
your first challenge.</div>
`,

      content: `
<p>An LLM alone can only <em>talk</em>. An <strong>agent</strong> is an LLM given
the ability to <em>act</em> — call a calculator, search files, hit an API — plus a
loop that feeds the results back. That loop is disarmingly simple, and by the end
of this lesson you'll have built it from scratch:</p>
<pre><code>loop:
  reply = llm(messages)                 # model REASONS about what to do
  if reply is a final answer: return it
  if reply is a tool call:
      result = run_the_tool(reply)      # your code ACTS
      messages += observation(result)   # model will OBSERVE next turn</code></pre>

<h2>Why this works</h2>
<p>The model never executes anything — it only ever emits text saying
<em>"I want to call <code>calculator</code> with <code>6 × 7</code>"</em>
(as structured output — lesson 1's JSON, earning its keep). <strong>Your code</strong>
decides whether to honor the request, runs the real function, and appends the
result to the conversation. Next iteration, the model sees the observation and
either answers or asks for another tool. Reason → act → observe → repeat.</p>
<p>Sit with how much falls out of this one pattern: "look it up" (a search tool),
"do the math" (a calculator), "check the calendar", "read this file", "book the
meeting" — the loop never changes, only the tool list grows. Every commercial
agent product you've seen is this loop with better marketing.</p>

<h2>Guardrails are part of the loop, not an add-on</h2>
<ul>
  <li><strong>Step limits.</strong> Models can loop forever (re-calling the same
      tool, chasing their tail). A maximum step count is the seatbelt every real
      agent wears — yours will wear one too.</li>
  <li><strong>Tool allowlists.</strong> The model can only request tools you chose
      to expose. An agent with a read-only toolbox <em>cannot</em> delete your
      files, no matter how confused it gets. Capability design &gt; hoping the
      model behaves.</li>
  <li><strong>The human stays the decision-maker.</strong> Dangerous tools
      (spending money, sending email) get a confirmation step. You'll see this in
      every serious agent framework — and now you know it's not the framework
      being annoying.</li>
</ul>

<div class="callout callout-tradeoff"><strong>Power / privacy / cost:</strong>
where should the LLM run? <em>Cloud APIs</em> (Claude, GPT, Gemini) give maximum
reasoning power with zero setup — but every message, document, and tool result
leaves your machine, and you pay per token forever. <em>Local models</em> via
<a href="https://ollama.com">Ollama</a> or llama.cpp run on your own hardware:
complete privacy (nothing leaves the box — verify with wifi off), zero marginal
cost, full control; the price is weaker reasoning and your RAM. The agent loop
you're about to build is <em>identical</em> either way — swap the
<code>llm</code> function, keep everything else. That's why we practice against a
mock: the loop is the skill, the model is a plug.</div>
`,

/* ================= js/data/curriculum.js ================= */
/**
 * curriculum.js — aggregates all module files and provides the progress
 * helpers used by views and achievements.
 *
 * Adding a module = create js/data/moduleN.js and add it to MODULES below.
 */







const MODULES = [
  module1,
  module2,
  module3,
  module4,
  module5,
  module6,
  module7,
  module8,
];

/* ---------------- Lookups ---------------- */

function getModule(moduleId) {
  return MODULES.find((m) => m.id === moduleId) || null;
}

function getLesson(moduleId, lessonId) {
  const mod = getModule(moduleId);
  if (!mod) return null;
  return mod.lessons.find((l) => l.id === lessonId) || null;
}

/** Progress for lessons AND their challenges is keyed by "m1-l2". */
function lessonKey(moduleId, lessonId) {
  return `${moduleId}-${lessonId}`;
}

/* ---------------- Progress helpers ---------------- */

/** Lessons that actually have content (stub lessons don't count). */
function readyLessons(mod) {
  return mod.lessons.filter((l) => !l.stub);
}

/**
 * A module is COMPLETE when it has real lessons and all of them are done,
 * including passing each lesson's challenge. (Projects grant extra XP and
 * achievements but don't gate progression — they take days, not minutes.)
 */
function isModuleComplete(moduleId) {
  const mod = getModule(moduleId);
  if (!mod) return false;
  const lessons = readyLessons(mod);
  if (lessons.length === 0) return false;
  return lessons.every((l) => {
    const key = lessonKey(mod.id, l.id);
    if (!state.isLessonDone(key)) return false;
    if (l.challenge && !state.isChallengePassed(key)) return false;
    return true;
  });
}

/**
 * "Satisfied" is the unlock-gate version of complete: a stub module (nothing
 * to do yet) never blocks the modules after it.
 */
function isModuleSatisfied(mod) {
  if (readyLessons(mod).length === 0) return true;
  return isModuleComplete(mod.id);
}

/**
 * Module 1 is always unlocked; each later module unlocks when everything
 * before it is satisfied. Free Roam mode (a real setting, because self-taught
 * learners know their own path) unlocks everything.
 */
function isModuleUnlocked(moduleId) {
  if (state.isFreeRoam()) return true;
  const index = MODULES.findIndex((m) => m.id === moduleId);
  if (index <= 0) return true;
  return MODULES.slice(0, index).every(isModuleSatisfied);
}

/** { done, total, pct } across a module's lessons, challenges, and project. */
function moduleProgress(mod) {
  let done = 0;
  let total = 0;
  for (const l of readyLessons(mod)) {
    const key = lessonKey(mod.id, l.id);
    total += 1;
    if (state.isLessonDone(key)) done += 1;
    if (l.challenge) {
      total += 1;
      if (state.isChallengePassed(key)) done += 1;
    }
  }
  if (mod.project) {
    total += 1;
    if (state.isProjectDone(mod.project.id)) done += 1;
  }
  return { done, total, pct: total === 0 ? 0 : Math.round((done / total) * 100) };
}

/* ================= js/runner.js ================= */
/**
 * runner.js — runs learner code and hidden tests, entirely in the browser.
 *
 * JavaScript: executed with `new Function` — the browser's own engine is the
 * judge, no server involved. Each test re-runs the learner's code followed by
 * one assertion snippet, so a single failing test can't poison the others.
 *
 * Python: executed by Pyodide (CPython compiled to WebAssembly), lazy-loaded
 * from a CDN only when a Python challenge actually runs — the rest of the
 * site never pays that cost.
 */

/* ---------------- assertion helpers (injected into JS tests) ---------------- */

function assert(condition, message) {
  if (!condition) throw new Error(message || "Assertion failed");
}

/** Deep-ish equality via JSON — plenty for numbers, strings, arrays, objects. */
function assertEqual(actual, expected, message) {
  const a = JSON.stringify(actual);
  const e = JSON.stringify(expected);
  if (a !== e) {
    throw new Error(
      (message ? message + " — " : "") + `expected ${e} but got ${a === undefined ? "undefined" : a}`
    );
  }
}

/** A console stand-in that records logs instead of (only) printing them. */
function makeCapturingConsole(logs) {
  const fmt = (args) =>
    args
      .map((v) => (typeof v === "string" ? v : JSON.stringify(v)))
      .join(" ");
  return {
    log: (...args) => logs.push(fmt(args)),
    error: (...args) => logs.push("ERROR: " + fmt(args)),
    warn: (...args) => logs.push("WARN: " + fmt(args)),
  };
}

/* ---------------- JavaScript ---------------- */

/** Run learner code alone; return whatever it logged (for the Run button). */
function runJS(code) {
  const logs = [];
  try {
    const fn = new Function("console", "assert", "assertEqual", `"use strict";\n${code}`);
    fn(makeCapturingConsole(logs), assert, assertEqual);
    return { ok: true, logs };
  } catch (err) {
    return { ok: false, logs, error: String(err && err.message ? err.message : err) };
  }
}

/** Run learner code + each hidden test; return per-test results (Check button). */
function checkJS(code, tests) {
  const results = [];
  for (const test of tests) {
    const logs = [];
    try {
      const fn = new Function(
        "console",
        "assert",
        "assertEqual",
        `"use strict";\n${code}\n;/* --- hidden test --- */\n${test.code}`
      );
      fn(makeCapturingConsole(logs), assert, assertEqual);
      results.push({ name: test.name, ok: true });
    } catch (err) {
      results.push({
        name: test.name,
        ok: false,
        message: String(err && err.message ? err.message : err),
        hint: test.hint,
      });
    }
  }
  return { passed: results.every((r) => r.ok), results };
}

/* ---------------- Python (Pyodide, lazy) ---------------- */

const PYODIDE_VERSION = "v0.26.4";
const PYODIDE_BASE = `https://cdn.jsdelivr.net/pyodide/${PYODIDE_VERSION}/full/`;

let pyodidePromise = null;

/** Load Pyodide once, on first use. `onStatus` lets the UI show progress. */
function getPyodide(onStatus) {
  if (!pyodidePromise) {
    onStatus?.("Downloading the Python runtime (~10 MB, first time only)…");
    pyodidePromise = new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = PYODIDE_BASE + "pyodide.js";
      script.onload = () => {
        window
          .loadPyodide({ indexURL: PYODIDE_BASE })
          .then(resolve, reject);
      };
      script.onerror = () =>
        reject(new Error("Could not load Pyodide. Python challenges need an internet connection (just this once — everything else on this site is offline-friendly)."));
      document.head.appendChild(script);
    }).catch((err) => {
      pyodidePromise = null; // allow retrying after a network hiccup
      throw err;
    });
  }
  return pyodidePromise;
}

/** Trim Pyodide's long traceback down to the line a learner needs. */
function pythonErrorMessage(err) {
  const text = String(err && err.message ? err.message : err);
  const lines = text.trim().split("\n");
  // The last line of a Python traceback is "ErrorType: message" — the useful bit.
  const last = lines[lines.length - 1] || text;
  return last;
}

/** Run learner Python alone, capturing print() output (Run button). */
async function runPython(code, onStatus) {
  const logs = [];
  try {
    const pyodide = await getPyodide(onStatus);
    onStatus?.("Running…");
    pyodide.setStdout({ batched: (line) => logs.push(line) });
    pyodide.setStderr({ batched: (line) => logs.push("ERROR: " + line) });
    const namespace = pyodide.globals.get("dict")();
    try {
      await pyodide.runPythonAsync(code, { globals: namespace });
    } finally {
      namespace.destroy();
    }
    return { ok: true, logs };
  } catch (err) {
    return { ok: false, logs, error: pythonErrorMessage(err) };
  }
}

/** Run learner Python + each test's assert snippet (Check button). */
async function checkPython(code, tests, onStatus) {
  let pyodide;
  try {
    pyodide = await getPyodide(onStatus);
  } catch (err) {
    // Couldn't even load the runtime — every test "fails" with the reason.
    return {
      passed: false,
      results: tests.map((t) => ({ name: t.name, ok: false, message: String(err.message || err) })),
    };
  }

  onStatus?.("Checking…");
  pyodide.setStdout({ batched: () => {} }); // tests don't need learner prints
  pyodide.setStderr({ batched: () => {} });

  const results = [];
  for (const test of tests) {
    // A fresh namespace per test so tests can't contaminate each other.
    const namespace = pyodide.globals.get("dict")();
    try {
      await pyodide.runPythonAsync(code + "\n\n# --- hidden test ---\n" + test.code, {
        globals: namespace,
      });
      results.push({ name: test.name, ok: true });
    } catch (err) {
      results.push({
        name: test.name,
        ok: false,
        message: pythonErrorMessage(err),
        hint: test.hint,
      });
    } finally {
      namespace.destroy();
    }
  }
  return { passed: results.every((r) => r.ok), results };
}

/**

 * Each render function receives the <main id="app"> element. Content HTML

/* ------------------------------------------------------------------ */
/* Achievements: after any progress event, re-evaluate every check.     */
/* ------------------------------------------------------------------ */

function checkAchievements() {
  const snap = state.snapshot();
  const ctx = {
    completedLessons: snap.completedLessons,
    passedChallenges: snap.passedChallenges,
    completedProjects: snap.completedProjects,
    modules: MODULES,
    isModuleComplete,
  };
  for (const def of ACHIEVEMENTS) {
    if (!state.hasAchievement(def.id) && def.check(ctx)) {
      state.unlockAchievement(def);
    }
  }
}

  const items = MODULES.map((mod) => {
    const unlocked = isModuleUnlocked(mod.id);
    const complete = isModuleComplete(mod.id);
    const progress = moduleProgress(mod);
    const stateClass = complete ? "done" : unlocked ? "unlocked" : "locked";
    const node = complete ? "✓" : unlocked ? mod.number : "🔒";

    const badges = [
      mod.flagship ? `<span class="badge badge-flagship">★ Flagship</span>` : "",
      mod.status === "stub" ? `<span class="badge badge-stub">Coming soon</span>` : "",
      complete
        ? `<span class="badge badge-done">Complete</span>`
        : unlocked
        ? `<span class="badge badge-unlocked">Unlocked</span>`
        : `<span class="badge">Locked</span>`,
    ].join("");

    const card = `
      <h3>Module ${mod.number}: ${mod.title}</h3>
      <p>${mod.tagline}</p>
      <div class="module-meta">
        ${badges}
        ${progress.total > 0 ? `<span>${progress.done}/${progress.total} steps</span>` : ""}
      </div>
      ${
        progress.total > 0
          ? `<div class="mini-progress"><div class="mini-progress-fill" style="width:${progress.pct}%"></div></div>`
          : ""
      }`;

    // Locked modules render as a <div> (not a link) so keyboard users don't
    // tab into dead ends; the lock state is explained on the card itself.
    const cardEl = unlocked
      ? `<a class="module-card" href="#/module/${mod.id}">${card}</a>`
      : `<div class="module-card locked" aria-disabled="true">${card}</div>`;

    return `
      <li class="roadmap-item ${stateClass}">
        <div class="roadmap-node" aria-hidden="true">${node}</div>
        ${cardEl}
      </li>`;
  }).join("");

  app.innerHTML = `
    <section class="hero">
      <h1>Zero to <span class="grad">Builder</span></h1>
      <p>A first-principles path from "computers are magic" to shipping real
         software and AI agents. No memorizing — understanding.</p>
      <label class="free-roam">
        <input type="checkbox" id="free-roam" ${state.isFreeRoam() ? "checked" : ""} />
        Free Roam — unlock every module (you know your own path)
      </label>
    </section>
    <ol class="roadmap" aria-label="Learning path">${items}</ol>
  `;

  app.querySelector("#free-roam").addEventListener("change", (e) => {
    state.setFreeRoam(e.target.checked);
    renderHome(app); // re-render so locks update instantly
  });
}

/* ------------------------------------------------------------------ */
/* Lesson page: content + challenge + completion                        */

function renderLesson(app, moduleId, lessonId) {
  const mod = getModule(moduleId);
  const lesson = getLesson(moduleId, lessonId);
  if (!mod || !lesson || lesson.stub) return renderNotFound(app);

  const key = lessonKey(moduleId, lessonId);
  const done = state.isLessonDone(key);

  // Prev/next within this module's ready lessons, for a guided flow.
  const ready = readyLessons(mod);
  const idx = ready.findIndex((l) => l.id === lessonId);
  const prev = idx > 0 ? ready[idx - 1] : null;
  const next = idx < ready.length - 1 ? ready[idx + 1] : null;

  app.innerHTML = `
    <p class="crumbs">
      <a href="#/">Path</a> /
      <a href="#/module/${mod.id}">Module ${mod.number}</a> /
      ${lesson.title}
    </p>
    <div class="page-head">
      <h1>${lesson.title}</h1>
      <p class="tagline">${lesson.minutes} min · Module ${mod.number}: ${mod.title}</p>
    </div>
    <article class="lesson-body">${lesson.content}</article>

    <div id="challenge-slot"></div>

    <div class="lesson-nav">
      <span>
        ${prev ? `<a class="btn" href="#/lesson/${mod.id}/${prev.id}">← ${prev.title}</a>` : `<a class="btn" href="#/module/${mod.id}">← Module overview</a>`}
      </span>
      <button class="btn ${done ? "" : "btn-primary"}" id="complete-lesson" ${done ? "disabled" : ""}>
        ${done ? "✓ Lesson complete" : "Mark lesson complete"}
      </button>
      <span>
        ${next ? `<a class="btn" href="#/lesson/${mod.id}/${next.id}">${next.title} →</a>` : `<a class="btn" href="#/module/${mod.id}">Finish module →</a>`}
      </span>
    </div>
  `;

  app.querySelector("#complete-lesson").addEventListener("click", (e) => {
    state.completeLesson(key, lesson.title);
    checkAchievements();
    e.target.disabled = true;
    e.target.textContent = "✓ Lesson complete";
    e.target.classList.remove("btn-primary");
  });

  if (lesson.challenge) {
    renderChallenge(app.querySelector("#challenge-slot"), key, lesson.challenge);
  }
}

/* ------------------------------------------------------------------ */
/* Challenge widget: editor + Run + Check + console                     */
/* ------------------------------------------------------------------ */

function renderChallenge(slot, key, challenge) {
  const passed = state.isChallengePassed(key);
  const savedCode = state.getSavedCode(key);

  slot.innerHTML = `
    <section class="challenge" aria-label="Interactive challenge">
      <div class="challenge-head">
        <h3>⚡ Challenge: ${challenge.title}</h3>
        <span class="lang-chip">${challenge.language === "python" ? "Python" : "JavaScript"}</span>
        ${passed ? `<span class="badge badge-done">Passed ✓</span>` : ""}
      </div>
      <div class="challenge-prompt">${challenge.prompt}</div>
      <div class="editor-wrap">
        <label class="sub" for="code-${key}" style="display:block;margin-bottom:.35rem;font-size:.75rem;color:var(--text-dim)">
          Your code (auto-saved as you type — Tab indents)
        </label>
        <textarea class="code-input" id="code-${key}" spellcheck="false"
          autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
      </div>
      <div class="challenge-actions">
        <button class="btn btn-primary" data-act="run">▶ Run</button>
        <button class="btn btn-success" data-act="check">✔ Check</button>
        <button class="btn btn-sm" data-act="hint">💡 Hint</button>
        <button class="btn btn-sm" data-act="reset">↺ Reset</button>
        <span class="challenge-status" data-role="status" role="status"></span>
      </div>
      <div class="console" data-role="console" aria-live="polite" aria-label="Code output"></div>
    </section>
  `;

  const textarea = slot.querySelector("textarea");
  const consoleEl = slot.querySelector('[data-role="console"]');
  const statusEl = slot.querySelector('[data-role="status"]');
  textarea.value = savedCode ?? challenge.starterCode;

  // Tab inserts two spaces instead of leaving the editor. Escape-then-Tab
  // still moves focus, so keyboard users are never trapped (a11y).
  let escapePressed = false;
  textarea.addEventListener("keydown", (e) => {
    if (e.key === "Escape") { escapePressed = true; return; }
    if (e.key === "Tab" && !escapePressed) {
      e.preventDefault();
      const { selectionStart: s, selectionEnd: en, value } = textarea;
      textarea.value = value.slice(0, s) + "  " + value.slice(en);
      textarea.selectionStart = textarea.selectionEnd = s + 2;
    }
    escapePressed = false;
  });

  // Auto-save drafts (debounced) so refreshes never lose work.
  let saveTimer;
  textarea.addEventListener("input", () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => state.saveCode(key, textarea.value), 400);
  });

  /* --- console rendering: learner output must never inject HTML --- */
  const writeLine = (text, cls) => {
    const line = document.createElement("div");
    if (cls) line.className = cls;
    line.textContent = text;
    consoleEl.appendChild(line);
  };
  const clearConsole = () => (consoleEl.innerHTML = "");
  const setStatus = (text) => (statusEl.textContent = text);

  const showRunResult = (result) => {
    clearConsole();
    result.logs.forEach((l) => writeLine(l));
    if (result.ok) {
      if (result.logs.length === 0) writeLine("(ran fine — nothing was logged)", "dim");
    } else {
      writeLine("✗ " + result.error, "err");
    }
    setStatus("");
  };

  const showCheckResult = (result) => {
    clearConsole();
    result.results.forEach((r) => {
      if (r.ok) {
        writeLine("✓ " + r.name, "ok");
      } else {
        writeLine("✗ " + r.name, "err");
        writeLine("   " + r.message, "err");
        if (r.hint) writeLine("   hint: " + r.hint, "hint");
      }
    });
    if (result.passed) {
      writeLine("", "");
      writeLine("All tests passed. 🎉", "ok");
      const first = state.passChallenge(key, challenge.title);
      checkAchievements();
      setStatus(first ? "Challenge passed!" : "Still passing ✓");
      const head = slot.querySelector(".challenge-head");
      if (!head.querySelector(".badge-done")) {
        const badge = document.createElement("span");
        badge.className = "badge badge-done";
        badge.textContent = "Passed ✓";
        head.appendChild(badge);
      }
    } else {
      const failed = result.results.filter((r) => !r.ok).length;
      setStatus(`${result.results.length - failed}/${result.results.length} tests passing`);
    }
  };

  slot.querySelector('[data-act="run"]').addEventListener("click", async () => {
    if (challenge.language === "python") {
      setStatus("…");
      const result = await runPython(textarea.value, setStatus);
      showRunResult(result);
    } else {
      showRunResult(runJS(textarea.value));
    }
  });

  slot.querySelector('[data-act="check"]').addEventListener("click", async () => {
    if (challenge.language === "python") {
      setStatus("…");
      const result = await checkPython(textarea.value, challenge.tests, setStatus);
      showCheckResult(result);
      setStatus(statusEl.textContent || "");
    } else {
      showCheckResult(checkJS(textarea.value, challenge.tests));
    }
  });

  slot.querySelector('[data-act="hint"]').addEventListener("click", () => {
    clearConsole();
    writeLine("💡 " + challenge.hint, "hint");
  });

  slot.querySelector('[data-act="reset"]').addEventListener("click", () => {
    textarea.value = challenge.starterCode;
    state.saveCode(key, challenge.starterCode);
    clearConsole();
    setStatus("Reset to starter code");
  });
}

/* ------------------------------------------------------------------ */
/* Project page: brief + persisted checklist                            */
/* ------------------------------------------------------------------ */

function renderProject(app, moduleId) {
  const mod = getModule(moduleId);
  if (!mod || !mod.project) return renderNotFound(app);
  const project = mod.project;
  const checks = state.getProjectChecks(project.id);
  const doneAlready = state.isProjectDone(project.id);

  const items = project.checklist
    .map((item) => {
      const ticked = !!checks[item.id];
      return `
        <li class="${ticked ? "ticked" : ""}">
          <label>
            <input type="checkbox" data-item="${item.id}" ${ticked ? "checked" : ""} />
            <span>${item.text}</span>
          </label>
        </li>`;
    })
    .join("");

  app.innerHTML = `
    <p class="crumbs">
      <a href="#/">Path</a> /
      <a href="#/module/${mod.id}">Module ${mod.number}</a> /
      Project
    </p>
    <div class="page-head">
      <h1>🛠️ ${project.title}</h1>
      <p class="tagline">Build project · Module ${mod.number}: ${mod.title}</p>
    </div>
    <div class="project-brief">
      ${project.brief}
      <div class="callout"><strong>Self-assessment:</strong> tick each item only
      when it's genuinely true — this checklist is your engineering integrity in
      miniature. Ticks persist on this device; completing all of them earns the
      project XP${doneAlready ? " (already earned ✓)" : ""}.</div>
      <ul class="checklist">${items}</ul>
      <p id="project-status" role="status" class="tagline">${
        doneAlready ? "✓ Project complete — well built." : ""
      }</p>
    </div>
  `;

  app.querySelectorAll('input[type="checkbox"]').forEach((box) => {
    box.addEventListener("change", () => {
      state.setProjectCheck(project.id, box.dataset.item, box.checked);
      box.closest("li").classList.toggle("ticked", box.checked);

      const allTicked = project.checklist.every(
        (item) => state.getProjectChecks(project.id)[item.id]
      );
      if (allTicked) {
        state.completeProject(project.id, project.title);
        checkAchievements();
        app.querySelector("#project-status").textContent = "✓ Project complete — well built.";
      }
    });
  });
}

/* ------------------------------------------------------------------ */
/* Achievements shelf                                                   */
/* ------------------------------------------------------------------ */

function renderAchievements(app) {
  const earned = state.getAchievements();
  const earnedCount = Object.keys(earned).length;

  const shelf = ACHIEVEMENTS.map((a) => {
    const at = earned[a.id];
    return `
      <li class="trophy ${at ? "earned" : "locked"}">
        <span class="emoji" aria-hidden="true">${a.emoji}</span>
        <div>
          <h4>${a.name}</h4>
          <p>${a.competency}</p>
          ${at ? `<span class="earned-date">Earned ${new Date(at).toLocaleDateString()}</span>` : ""}
        </div>
      </li>`;
  }).join("");

  app.innerHTML = `
    <div class="page-head">
      <h1>Achievements</h1>
      <p class="tagline">${earnedCount} of ${ACHIEVEMENTS.length} earned — each one
      is a real engineering competency, not a login streak.</p>
    </div>
    <ul class="shelf">${shelf}</ul>
  `;
}

/* ------------------------------------------------------------------ */

function renderNotFound(app) {
  app.innerHTML = `
    <div class="page-head">
      <h1>404 — nothing here</h1>
      <p class="tagline">This route doesn't exist. A good engineer checks the URL first. 😉</p>
    </div>
    <a class="btn btn-primary" href="#/">← Back to the path</a>`;
}

/* ================= js/main.js ================= */
/**
 * main.js — boot, hash router, header HUD, theme toggle.
 *
 * Routing uses the URL hash (#/lesson/m1/l1) because GitHub Pages serves
 * static files only: a hash change never triggers a server request, so no
 * 404 tricks are needed and the back button works for free.
 */



const app = document.getElementById("app");

/* ---------------- Router ---------------- */

function route() {
  // "#/lesson/m1/l2" → ["lesson", "m1", "l2"]
  const hash = window.location.hash.replace(/^#\/?/, "");
  const parts = hash.split("/").filter(Boolean);

  if (parts.length === 0) {
    renderHome(app);
  } else if (parts[0] === "module" && parts[1]) {
    renderModule(app, parts[1]);
  } else if (parts[0] === "lesson" && parts[1] && parts[2]) {
    renderLesson(app, parts[1], parts[2]);
  } else if (parts[0] === "project" && parts[1]) {
    renderProject(app, parts[1]);
  } else if (parts[0] === "achievements") {
    renderAchievements(app);
  } else {
    renderNotFound(app);
  }

  updateNavHighlight(parts[0] || "home");
  // New page: scroll to the top and move focus to main content so keyboard
  // and screen-reader users land where the new content starts.
  window.scrollTo(0, 0);
  app.focus({ preventScroll: true });
}

function updateNavHighlight(section) {
  document.querySelectorAll(".site-nav a[data-nav]").forEach((a) => {
    const isActive =
      a.dataset.nav === section ||
      (a.dataset.nav === "home" && ["module", "lesson", "project"].includes(section));
    a.classList.toggle("active", isActive);
  });
}

/* ---------------- Header HUD ---------------- */

function updateHUD() {
  const { level, title, pct } = state.getLevel();
  document.getElementById("hud-level").textContent = level;
  document.getElementById("hud-title").textContent = title;
  document.getElementById("hud-xp-fill").style.width = pct + "%";
  document.getElementById("hud-xp-text").textContent = state.getXP() + " XP";
}

/* ---------------- Boot ---------------- */

// Re-render the HUD whenever progress changes (XP, achievements, settings).
state.subscribe(updateHUD);
updateHUD();

document.getElementById("theme-toggle").addEventListener("click", () => {
  state.toggleTheme();
});

// In case a save from an older visit qualifies for achievements added since.
checkAchievements();

window.addEventListener("hashchange", route);
route();

  </script>
